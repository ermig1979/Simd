name: Test

on:
  push:
    branches: [ "dev" ]

jobs:
  build_and_test_arm64:
    runs-on: ubuntu-24.04-arm

    strategy:
      matrix:
        gcc_version: [13]
        build_type: [Release]

    steps:
    - uses: actions/checkout@v3

    - name: Host properties
      run: lscpu

    - name: Install toolchain
      run: |
        sudo apt-get update 
        sudo apt-get -y install g++-${{matrix.gcc_version}}

    - name: Configure CMake
      run: cmake ./prj/cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DSIMD_TOOLCHAIN="g++-${{matrix.gcc_version}}" -DSIMD_TARGET="" -DSIMD_TEST_FLAGS="-march=native -march=armv8-a+sve" -DSIMD_SVE=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.build_type}} --parallel$(nproc)
      
    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ./Test "-r=.." -m=a -tt=4 -ts=5 -mt=1 -w=640 -h=480 -c=256
